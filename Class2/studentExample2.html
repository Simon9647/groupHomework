<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    
    <title>Student Example 2</title>
</head>

<body>


    <!-- Modal -->
    <div class="modal fade" id="addModal" tabindex="-1" aria-labelledby="addModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h1 class="modal-title fs-5" id="addModalLabel">Add New Student</h1>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label for="firstName" class="form-label required">First Name:</label>
                        <input type="text" id="firstNameInput" class="form-control" />
                    </div>
                    <div class="mb-3">
                        <label for="lastName" class="form-label required">Last Name:</label>
                        <input type="text" id="lastNameInput" class="form-control" />
                    </div>
                    <div class="mb-3 ">
                        <label for="age" class="form-label required">Age:</label>
                        <input type="text" id="ageInput" class="form-control" />
                    </div>
                    <div class="mb-3">
                        <label for="major" class="form-label required">Major:</label>
                        <input type="text" id="majorInput" class="form-control" />
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="button" class="btn btn-primary" onclick="addNewStudent()">Save changes</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="editModal" tabindex="-1" aria-labelledby="editModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h1 class="modal-title fs-5" id="editModalLabel">Edit Student</h1>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="my-3">
                        <label for="id" class="form-label required">Id:</label>
                        <input type="text" id="editIdInput" class="form-control" readonly />
                    </div>
                    <div class="mb-3">
                        <label for="firstName" class="form-label required">First Name:</label>
                        <input type="text" id="editFirstNameInput" class="form-control" />
                    </div>
                    <div class="mb-3">
                        <label for="lastName" class="form-label required">Last Name:</label>
                        <input type="text" id="editLastNameInput" class="form-control" />
                    </div>
                    <div class="mb-3 ">
                        <label for="age" class="form-label required">Age:</label>
                        <input type="text" id="editAgeInput" class="form-control" />
                    </div>
                    <div class="mb-3">
                        <label for="major" class="form-label required">Major:</label>
                        <input type="text" id="editMajorInput" class="form-control" />
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="button" id="btnEdit" class="btn btn-primary" onclick="updateStudent()">Update</button>
                </div>
            </div>
        </div>
    </div>




    <div class="container mt-5">
        <h3>Student Management System</h3>
        <div class="my-3">
            <div class="row">
                <div class="col">
                    <button id="mapAddButton" data-bs-toggle="modal" data-bs-target="#addModal"
                        class="btn btn-primary">Add</button>
                        <button id="disableButtons" class="btn btn-secondary" onclick="disabeEditDeleteButtons(5)">Disable Edit/Delete</button>
                </div>
                <div class="col">
                    <div class="input-group">
                        <input type="text" id="searchNameInput" class="form-control" placeholder="Student name"
                            aria-label="Enter student name" aria-describedby="searchButton">
                        <button id="searchButton" onclick="doSearchStudentByName()"
                            class="btn btn-primary">Search</button>
                        <button class="btn btn-secondary" type="button" onclick="clearSearch()">Clear</button>
                    </div>
                </div>
            </div>
            <table class="table table-hover" id="studentTable">
                <thead>
                    <tr>
                        <th scope="col">ID</th>
                        <th scope="col">First Name</th>
                        <th scope="col">Last Name</th>
                        <th scope="col">Age</th>
                        <th scope="col">Major</th>
                        <th></th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="studentTableBody">
                    <!-- Student rows will be dynamically added here -->
                </tbody>
            </table>
        </div>


        <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
            integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
            crossorigin="anonymous"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"
            integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y"
            crossorigin="anonymous"></script>
            <script src="backend.js"></script>
        <script src="studentExample2.js"></script>
</body>

</html>
